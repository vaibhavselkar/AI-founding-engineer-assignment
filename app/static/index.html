<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AEGIS — AEO Content Scorer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 40px;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #1a1a2e;
    }
    header h1 span {
      color: #5b4fff;
    }
    header p {
      margin-top: 8px;
      color: #666;
      font-size: 0.95rem;
    }

    /* ── Input Card ── */
    .input-card {
      background: #fff;
      border: 1px solid #e0e0e8;
      border-radius: 14px;
      padding: 28px;
      width: 100%;
      max-width: 640px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .input-card label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 10px;
    }
    .input-row {
      display: flex;
      gap: 10px;
    }
    .input-row input {
      flex: 1;
      background: #f5f5f7;
      border: 1px solid #dcdce8;
      border-radius: 8px;
      padding: 12px 14px;
      color: #1a1a2e;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input:focus {
      border-color: #5b4fff;
      background: #fff;
    }
    .input-row input::placeholder { color: #aaa; }

    .btn-analyze {
      background: #5b4fff;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 22px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, opacity 0.2s;
    }
    .btn-analyze:hover { background: #4a3eee; }
    .btn-analyze:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Loader ── */
    #loader {
      display: none;
      margin-top: 32px;
      text-align: center;
      color: #888;
      font-size: 0.9rem;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #e0e0e8;
      border-top-color: #5b4fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error ── */
    #error-box {
      display: none;
      margin-top: 24px;
      background: #fff5f5;
      border: 1px solid #fecaca;
      border-radius: 10px;
      padding: 16px 20px;
      color: #dc2626;
      font-size: 0.9rem;
      width: 100%;
      max-width: 640px;
    }

    /* ── Results ── */
    #results {
      display: none;
      width: 100%;
      max-width: 640px;
      margin-top: 28px;
    }

    /* Score Hero */
    .score-hero {
      background: #fff;
      border: 1px solid #e0e0e8;
      border-radius: 14px;
      padding: 28px;
      text-align: center;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .score-number {
      font-size: 4rem;
      font-weight: 800;
      line-height: 1;
      color: #1a1a2e;
    }
    .score-band {
      margin-top: 10px;
      font-size: 1rem;
      font-weight: 600;
    }
    .score-bar-wrap {
      margin-top: 18px;
      background: #f0f0f5;
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.8s ease;
    }

    /* Check Cards */
    .check-card {
      background: #fff;
      border: 1px solid #e0e0e8;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 12px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.04);
    }
    .check-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .check-title {
      font-weight: 600;
      font-size: 0.95rem;
      color: #1a1a2e;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .badge {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 99px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge-pass { background: #dcfce7; color: #16a34a; }
    .badge-fail { background: #fee2e2; color: #dc2626; }

    .check-score {
      font-size: 0.82rem;
      color: #888;
      white-space: nowrap;
    }

    .check-details {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }
    .detail-pill {
      background: #f5f5f7;
      border: 1px solid #e0e0e8;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.78rem;
      color: #666;
    }
    .detail-pill span { color: #1a1a2e; font-weight: 600; }

    .recommendation {
      background: #f5f3ff;
      border-left: 3px solid #5b4fff;
      border-radius: 0 6px 6px 0;
      padding: 10px 14px;
      font-size: 0.83rem;
      color: #555;
      line-height: 1.5;
    }

    .violations-list {
      margin-top: 8px;
      padding-left: 16px;
    }
    .violations-list li {
      font-size: 0.8rem;
      color: #dc2626;
      margin-bottom: 4px;
    }

    .complex-sentences {
      margin-top: 8px;
    }
    .complex-sentence {
      background: #f5f5f7;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.78rem;
      color: #777;
      margin-bottom: 4px;
      font-style: italic;
    }
  </style>
</head>
<body>

  <header>
    <h1>AEG<span>IS</span></h1>
    <p>Paste a URL — we'll score how well your content performs in AI search engines.</p>
  </header>

  <div class="input-card">
    <label>Website URL</label>
    <div class="input-row">
      <input
        type="url"
        id="url-input"
        placeholder="https://yoursite.com/article"
        autocomplete="off"
      />
      <button class="btn-analyze" id="analyze-btn" onclick="analyze()">Analyze</button>
    </div>
  </div>

  <div id="loader">
    <div class="spinner"></div>
    Crawling page and running checks…
  </div>

  <div id="error-box"></div>

  <div id="results">
    <div class="score-hero">
      <div class="score-number" id="score-number">—</div>
      <div class="score-band" id="score-band"></div>
      <div class="score-bar-wrap">
        <div class="score-bar-fill" id="score-bar"></div>
      </div>
    </div>
    <div id="checks-container"></div>
  </div>

  <script>
    async function analyze() {
      const url = document.getElementById("url-input").value.trim();
      if (!url) return;

      // Reset UI
      document.getElementById("results").style.display = "none";
      document.getElementById("error-box").style.display = "none";
      document.getElementById("loader").style.display = "block";
      document.getElementById("analyze-btn").disabled = true;

      try {
        const res = await fetch("/api/aeo/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ input_type: "url", input_value: url })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.detail || data.message || "Something went wrong.");
        }

        renderResults(data);

      } catch (err) {
        const box = document.getElementById("error-box");
        box.textContent = "Error: " + err.message;
        box.style.display = "block";
      } finally {
        document.getElementById("loader").style.display = "none";
        document.getElementById("analyze-btn").disabled = false;
      }
    }

    function scoreColor(score) {
      if (score >= 85) return "#4ade80";
      if (score >= 65) return "#facc15";
      if (score >= 40) return "#fb923c";
      return "#f87171";
    }

    function renderResults(data) {
      const score = data.aeo_score;
      document.getElementById("score-number").textContent = score;
      document.getElementById("score-band").textContent = data.band;
      document.getElementById("score-band").style.color = scoreColor(score);

      const bar = document.getElementById("score-bar");
      bar.style.width = score + "%";
      bar.style.background = scoreColor(score);

      const container = document.getElementById("checks-container");
      container.innerHTML = "";

      data.checks.forEach(check => {
        container.appendChild(renderCheck(check));
      });

      document.getElementById("results").style.display = "block";
    }

    function renderCheck(check) {
      const card = document.createElement("div");
      card.className = "check-card";

      const passClass = check.passed ? "badge-pass" : "badge-fail";
      const passLabel = check.passed ? "Pass" : "Fail";

      let detailsHTML = renderDetails(check);
      let recommendationHTML = check.recommendation
        ? `<div class="recommendation">${check.recommendation}</div>`
        : "";

      card.innerHTML = `
        <div class="check-header">
          <div class="check-title">
            <span class="badge ${passClass}">${passLabel}</span>
            ${check.name}
          </div>
          <div class="check-score">${check.score} / ${check.max_score}</div>
        </div>
        <div class="check-details">${detailsHTML}</div>
        ${renderExtras(check)}
        ${recommendationHTML}
      `;
      return card;
    }

    function renderDetails(check) {
      const d = check.details;
      const pills = [];

      if (d.word_count !== undefined)
        pills.push(`Word count: <span>${d.word_count}</span>`);
      if (d.is_declarative !== undefined)
        pills.push(`Declarative: <span>${d.is_declarative ? "Yes" : "No"}</span>`);
      if (d.has_hedge_phrase !== undefined)
        pills.push(`Hedge phrase: <span>${d.has_hedge_phrase ? "Yes" : "No"}</span>`);
      if (d.fk_grade_level !== undefined)
        pills.push(`FK Grade: <span>${d.fk_grade_level}</span> <span style="color:#555">(target 7–9)</span>`);
      if (d.violations !== undefined)
        pills.push(`Violations: <span>${d.violations.length}</span>`);
      if (d.h_tags_found !== undefined)
        pills.push(`Tags: <span>${d.h_tags_found.join(", ") || "none"}</span>`);

      return pills.map(p => `<div class="detail-pill">${p}</div>`).join("");
    }

    function renderExtras(check) {
      const d = check.details;
      let html = "";

      if (d.violations && d.violations.length > 0) {
        html += `<ul class="violations-list">` +
          d.violations.map(v => `<li>${v}</li>`).join("") +
          `</ul>`;
      }

      if (d.complex_sentences && d.complex_sentences.length > 0) {
        html += `<div class="complex-sentences">` +
          d.complex_sentences.map(s => `<div class="complex-sentence">"${s}"</div>`).join("") +
          `</div>`;
      }

      return html;
    }

    // Allow Enter key to trigger analyze
    document.getElementById("url-input").addEventListener("keydown", e => {
      if (e.key === "Enter") analyze();
    });
  </script>
</body>
</html>
